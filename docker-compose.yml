version: '3.8'

services:
  kanban:
    build:
      context: ./kanban_board
      dockerfile: Dockerfile
    container_name: kanban-board
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/prod.db
    volumes:
      - ./kanban_board/data:/app/data
    networks:
      - app-network

  fkandu-bot:
    build:
      context: ./fkandu_manager_bot
      dockerfile: Dockerfile
    container_name: fkandu-bot
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./fkandu_manager_bot/.env
    volumes:
      - ./fkandu_manager_bot/data:/app/data

  fkandu-api:
    build:
      context: ./fkandu_manager_bot/dashboard/backend
      dockerfile: Dockerfile
    container_name: fkandu-api
    restart: unless-stopped
    ports:
      - "3002:8000"
    volumes:
      - ./fkandu_manager_bot/data:/app/data
    networks:
      - app-network

  fkandu-dashboard:
    build:
      context: ./fkandu_manager_bot/dashboard/frontend
      dockerfile: Dockerfile
    container_name: fkandu-dashboard
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3002
    networks:
      - app-network

  pubg-bot:
    build:
      context: ./pubg_moderator_bot
      dockerfile: Dockerfile
    container_name: pubg-bot
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./pubg_moderator_bot/.env
    volumes:
      - ./pubg_moderator_bot/data:/app/data

networks:
  app-network:
    driver: bridge
