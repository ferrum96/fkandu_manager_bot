version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - ./nginx/www:/var/www/certbot:ro
    depends_on:
      - kanban
      - fkandu-bot
      - fkandu-dashboard
      - pubg-bot
    networks:
      - app-network
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  kanban:
    build:
      context: ./kanban_board
      dockerfile: Dockerfile
    container_name: kanban-board
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/prod.db
    volumes:
      - ./kanban_board/data:/app/data
    networks:
      - app-network

  fkandu-bot:
    build:
      context: ./fkandu_manager_bot
      dockerfile: Dockerfile
    container_name: fkandu-bot
    restart: unless-stopped
    expose:
      - "8088"
    env_file:
      - ./fkandu_manager_bot/.env
    volumes:
      - ./fkandu_manager_bot/db:/app/db
    networks:
      - app-network

  fkandu-dashboard:
    build:
      context: ./fkandu_manager_bot
      dockerfile: Dockerfile.dashboard
    container_name: fkandu-dashboard
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./fkandu_manager_bot/.env
    volumes:
      - ./fkandu_manager_bot/db:/app/db
    networks:
      - app-network

  pubg-bot:
    build:
      context: ./pubg_moderator_bot
      dockerfile: Dockerfile
    container_name: pubg-bot
    restart: unless-stopped
    env_file:
      - ./pubg_moderator_bot/.env
    volumes:
      - ./pubg_moderator_bot/data:/app/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
