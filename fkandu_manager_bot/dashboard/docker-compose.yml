version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://127.0.0.1:8001
    container_name: fkandu-frontend
    restart: unless-stopped
    network_mode: host
    environment:
      - NODE_ENV=production
      - PORT=8000
      - HOSTNAME=0.0.0.0

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fkandu-backend
    restart: unless-stopped
    network_mode: host
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8001"]
    volumes:
      - ../data:/app/data
