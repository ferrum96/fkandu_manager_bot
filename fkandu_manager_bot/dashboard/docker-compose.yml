version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fkandu-frontend
    restart: unless-stopped
    ports:
      - "8000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    networks:
      - dashboard-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fkandu-backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - ../data:/app/data
    networks:
      - dashboard-network

networks:
  dashboard-network:
    driver: bridge
