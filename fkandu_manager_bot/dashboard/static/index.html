<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>CRM — Дети и Желания</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f9fa;-webkit-tap-highlight-color:transparent}
.drag-over{background:rgba(33,150,243,0.08)!important;outline:2px dashed #2196f3;outline-offset:-2px}
.dragging{opacity:.4;transform:rotate(2deg)}
.sidebar-item{transition:all .15s;flex:1;overflow:hidden}
.sidebar-item:hover{background:rgba(255,255,255,.15)}
.sidebar-item.active{background:rgba(255,255,255,.2);border-left:3px solid white}
@media(min-width:768px){
  .sidebar-nav{display:flex;flex-direction:column}
  .sidebar-nav:hover .sidebar-item{flex:0.7}
  .sidebar-nav .sidebar-item:hover{flex:2;background:rgba(255,255,255,.15)}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.card-in{animation:fadeIn .2s ease}
@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.sidebar-open{animation:slideIn .2s ease}
.overlay{animation:fadeIn .15s ease}
.touch-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.85;transform:rotate(3deg) scale(1.05);transition:none}
.kanban-touch{user-select:none;-webkit-user-select:none}
@media(min-width:768px){.kanban-touch{touch-action:pan-x}}
</style>
<script>tailwind.config={theme:{extend:{colors:{peach:{100:'#ffe8db',400:'#ff8c5a'},rose:{400:'#ff5c8a'}}}}}</script>
</head>
<body>
<div id="root"></div>
<script>
var h=React.createElement;
var STATUSES=['🆕 Новая','📖 Изучаю','💬 В работе','✅ Договорились','💰 Оплачено','📢 Размещено','❌ Отказ'];
var STATUS_COLORS={'🆕 Новая':'#e3f2fd','📖 Изучаю':'#fff3e0','💬 В работе':'#fce4ec','✅ Договорились':'#e8f5e9','💰 Оплачено':'#f3e5f5','📢 Размещено':'#e0f7fa','❌ Отказ':'#ffebee'};
var STATUS_BG={'🆕 Новая':'bg-blue-50','📖 Изучаю':'bg-orange-50','💬 В работе':'bg-pink-50','✅ Договорились':'bg-green-50','💰 Оплачено':'bg-purple-50','📢 Размещено':'bg-cyan-50','❌ Отказ':'bg-red-50'};
var STATUS_TEXT={'🆕 Новая':'text-blue-700','📖 Изучаю':'text-orange-700','💬 В работе':'text-pink-700','✅ Договорились':'text-green-700','💰 Оплачено':'text-purple-700','📢 Размещено':'text-cyan-700','❌ Отказ':'text-red-700'};
var PAGES=[{k:'dashboard',i:'📊',l:'Дашборд'},{k:'kanban',i:'🗂',l:'Статусы заявок'},{k:'leads',i:'📋',l:'Все заявки'},{k:'hot',i:'🔥',l:'Горячие лиды'},{k:'analytics',i:'📈',l:'Аналитика'}];

function sc(s){if(!s)return'#4a90e2';if(s.indexOf('ГОРЯЧИЙ')>=0)return'#ff4b4b';if(s.indexOf('Теплый')>=0)return'#ffc107';return'#4a90e2'}
function sb(s){if(!s)return'bg-blue-100';if(s.indexOf('ГОРЯЧИЙ')>=0)return'bg-red-100';if(s.indexOf('Теплый')>=0)return'bg-yellow-100';return'bg-blue-100'}
function fM(n){return new Intl.NumberFormat('ru-RU').format(n||0)+' ₽'}
function fD(d){if(!d)return'—';return new Date(d).toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'})}
async function api(p,o){var r=await fetch(p,Object.assign({headers:{'Content-Type':'application/json'}},o||{}));return r.json()}
async function saveLead(id,d){return api('/api/leads/'+id,{method:'PATCH',body:JSON.stringify(d)})}

function fileIcon(name){
  if(!name)return'📄';
  var n=name.toLowerCase();
  if(n.match(/\.(jpg|jpeg|png|gif|webp)$/))return'🖼';
  if(n.match(/\.pdf$/))return'📕';
  if(n.match(/\.(doc|docx)$/))return'📘';
  if(n.match(/\.(xls|xlsx|csv)$/))return'📊';
  if(n.match(/\.(zip|rar|7z)$/))return'📦';
  if(n.match(/\.(mp4|avi|mov)$/))return'🎬';
  if(n.match(/\.(mp3|wav)$/))return'🎵';
  return'📎';
}

function renderTextWithLinks(text,key){
  var urlRe=/https?:\/\/[^\s<>"')\]]+/g;
  var result=[];
  var last=0;
  var m;
  while((m=urlRe.exec(text))!==null){
    if(m.index>last)result.push(h('span',{key:key+'_t'+last},text.substring(last,m.index)));
    var url=m[0];
    result.push(h('a',{key:key+'_a'+m.index,href:url,target:'_blank',className:'text-blue-500 hover:underline break-all'},url));
    last=urlRe.lastIndex;
  }
  if(last<text.length)result.push(h('span',{key:key+'_t'+last},text.substring(last)));
  return result;
}

function renderFiles(text,compact){
  if(!text)return null;
  var parts=text.split(/(<a\s+href=['"][^'"]*['"][^>]*>[\s\S]*?<\/a>)/gi);
  var textParts=[];
  var fileParts=[];
  parts.forEach(function(part,i){
    var m=part.match(/<a\s+href=['"]([^'"]*)['"][^>]*>([\s\S]*?)<\/a>/i);
    if(m){
      var url=m[1],content=m[2].trim();
      fileParts.push(h('a',{key:'f'+i,href:url,target:'_blank',className:'inline-flex items-center gap-1 text-sm text-blue-500 hover:underline'},content));
    }else if(part.trim()){
      var cleaned=part.trim().replace(/[\uD83C-\uDBFF\uDC00-\uDFFF]/g,'').trim();
      if(cleaned)textParts.push(renderTextWithLinks(cleaned,'t'+i));
    }
  });
  var result=[];
  if(textParts.length>0)result.push(h('div',{key:'txt',className:compact?'text-gray-600 line-clamp-2 break-words':'text-gray-600 whitespace-pre-wrap'},textParts));
  if(fileParts.length>0)result.push(h('div',{key:'files',className:'flex flex-wrap gap-1 mt-1'},fileParts));
  return result.length>0?result:null;
}

function Sidebar(p){
  var isOpen=p.open;
  var isMobile=window.innerWidth<768;
  if(isMobile&&!isOpen)return null;
  if(!isMobile&&p.collapsed)return h('div',{className:'fixed left-0 top-0 bottom-0 w-10 z-50 flex flex-col items-center bg-gradient-to-b from-rose-400 to-peach-400 text-white shadow-xl pt-4'},
    h('button',{onClick:p.onToggle,className:'text-white text-lg mb-4 hover:bg-white/20 rounded-lg w-8 h-8 flex items-center justify-center transition-all'},'☰'),
    PAGES.map(function(pg){
      return h('button',{key:pg.k,onClick:function(){p.setPage(pg.k)},className:'w-8 h-8 flex items-center justify-center rounded-lg mb-1 hover:bg-white/20 transition-all text-lg'+(p.page===pg.k?' bg-white/20':'')},pg.i);
    })
  );
  return h('div',{className:isMobile?'fixed inset-0 z-50 flex':'fixed left-0 top-0 bottom-0 w-56 z-50 flex flex-col transition-all duration-300'},
    isMobile?h('div',{className:'overlay absolute inset-0 bg-black/40',onClick:function(){p.onClose()}}):null,
    h('div',{className:(isMobile?'absolute left-0 top-0 bottom-0 w-56 sidebar-open ':'')+'bg-gradient-to-b from-rose-400 to-peach-400 text-white shadow-xl flex flex-col h-full'},
      h('div',{className:'p-4 border-b border-white/20 flex items-center justify-between'},
        h('div',null,h('h1',{className:'text-lg font-bold'},'🌸 CRM @fkandu'),h('p',{className:'text-xs opacity-80 mt-1'},'Дети и Желания')),
        h('div',{className:'flex items-center gap-2'},
          isMobile?h('button',{onClick:function(){p.onClose()},className:'text-white text-xl'},'✕'):h('button',{onClick:p.onToggle,className:'text-white text-lg hover:bg-white/20 rounded-lg w-8 h-8 flex items-center justify-center transition-all'},'◀'))),
      h('nav',{className:'sidebar-nav flex-1 py-2'},PAGES.map(function(pg){
        return h('button',{key:pg.k,onClick:function(){p.setPage(pg.k);isMobile?p.onClose():p.onToggle()},className:'sidebar-item w-full text-left px-4 py-3 text-sm flex items-center gap-2 '+(p.page===pg.k?'active font-semibold':'')},
          h('span',{className:'text-lg'},pg.i),' '+pg.l);
      })),
      h('div',{className:'p-4 border-t border-white/20 text-xs opacity-70'},'Данные из Telegram-бота')
    )
  );
}

function Metric(p){
  return h('div',{className:'bg-white rounded-xl p-3 md:p-4 shadow-sm border border-gray-100'},
    h('div',{className:'flex items-center gap-2 md:gap-3'},h('span',{className:'text-xl md:text-2xl'},p.icon),
    h('div',null,h('p',{className:'text-[10px] md:text-xs text-gray-500'},p.label),h('p',{className:'text-lg md:text-xl font-bold text-gray-800'},p.value))));
}

function DashboardPage(p){
  var leads=p.leads,stats=p.stats;
  var catC=['#ff6b9d','#c084fc','#60a5fa','#34d399','#fbbf24','#f87171','#a78bfa','#22d3ee','#fb923c'];
  return h('div',null,
    h('h1',{className:'text-xl md:text-2xl font-bold mb-4 md:mb-6'},'📊 Обзор канала'),
    h('div',{className:'grid grid-cols-2 gap-2 md:gap-4 mb-4 md:mb-6'},
      h(Metric,{icon:'📥',label:'Всего',value:stats.total}),
      h(Metric,{icon:'🔥',label:'Горячих',value:stats.hot}),
      h(Metric,{icon:'🆕',label:'Новых',value:stats['new']}),
      h(Metric,{icon:'💰',label:'Выручка',value:fM(stats.revenue)})
    ),
    h('div',{className:'grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 mb-4 md:mb-6'},
      h('div',{className:'bg-white rounded-xl p-3 md:p-4 shadow-sm border border-gray-100'},
        h('h3',{className:'font-semibold mb-3 text-sm md:text-base'},'📦 По категориям'),
        h('div',{className:'flex flex-wrap items-center justify-center gap-2 md:gap-3 py-2'},
          stats.by_category.length?stats.by_category.map(function(c,i){
            return h('div',{key:i,className:'text-center px-1'},
              h('div',{style:{width:'32px',height:'32px',borderRadius:'50%',background:catC[i%9],margin:'0 auto 2px',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:'bold',fontSize:'11px'}},c.count),
              h('p',{className:'text-[9px] md:text-xs text-gray-600 max-w-[80px] md:max-w-[100px] truncate'},c.category));
          }):h('p',{className:'text-gray-400'},'Нет данных')
        )
      ),
      h('div',{className:'bg-white rounded-xl p-3 md:p-4 shadow-sm border border-gray-100'},
        h('h3',{className:'font-semibold mb-3 text-sm md:text-base'},'🔥 По оценкам'),
        h('div',{className:'space-y-2'},stats.by_score.map(function(s){
          var mx=Math.max.apply(null,stats.by_score.map(function(x){return x.count}));
          return h('div',{key:s.lead_score,className:'flex items-center gap-2'},
            h('span',{className:'text-[10px] md:text-xs w-20 md:w-28 text-right text-gray-600 truncate'},s.lead_score),
            h('div',{className:'flex-1 bg-gray-100 rounded-full h-5 md:h-6 overflow-hidden'},
              h('div',{className:'h-full rounded-full flex items-center px-2',style:{background:sc(s.lead_score),width:Math.max(8,s.count/mx*100)+'%'}},
                h('span',{className:'text-white text-[10px] md:text-xs font-bold'},s.count))));
        }))
      )
    ),
    h('div',{className:'bg-white rounded-xl p-3 md:p-4 shadow-sm border border-gray-100'},
      h('h3',{className:'font-semibold mb-3 text-sm md:text-base'},'🕐 Последние 5'),
        h('div',{className:'overflow-x-auto -mx-3 md:mx-0'},
        h('table',{className:'w-full text-xs md:text-sm',style:{minWidth:'380px'}},
          h('thead',null,h('tr',{className:'text-left text-gray-500 border-b'},
            h('th',{className:'pb-2 px-2 md:px-3'},'Дата'),h('th',{className:'pb-2 px-2 md:px-3'},'Имя'),h('th',{className:'pb-2 px-2 md:px-3'},'Категория'),h('th',{className:'pb-2 px-2 md:px-3'},'Бюджет'),h('th',{className:'pb-2 px-2 md:px-3 hidden md:table-cell'},'Оценка'),h('th',{className:'pb-2 px-2 md:px-3 hidden md:table-cell'},'Статус'))),
          h('tbody',null,leads.slice(0,5).map(function(l){
            return h('tr',{key:l.id,className:'border-b border-gray-50 hover:bg-gray-50'},
              h('td',{className:'py-2 px-2 md:px-3 whitespace-nowrap'},fD(l.created_at)),
              h('td',{className:'py-2 px-2 md:px-3 font-medium'},l.full_name),
              h('td',{className:'py-2 px-2 md:px-3 truncate max-w-[100px]'},l.category),
              h('td',{className:'py-2 px-2 md:px-3'},l.budget),
              h('td',{className:'py-2 px-2 md:px-3 hidden md:table-cell'},h('span',{className:'text-xs px-2 py-0.5 rounded-full '+sb(l.lead_score)},l.lead_score)),
              h('td',{className:'py-2 px-2 md:px-3 hidden md:table-cell'},h('span',{className:'text-xs px-2 py-0.5 rounded-full '+(STATUS_BG[l.status]||'')+' '+(STATUS_TEXT[l.status]||'')},l.status)));
          }))
        )
      )
    )
  );
}

function KanbanCard(p){
  var l=p.lead;
  var uname=l.username&&l.username!=='Нет username'?l.username.replace('@',''):'';
  var info=l.product_info||'';
  var cleaned=info.replace(/<a\s+href=['"][^'"]*['"][^>]*>.*?<\/a>\s*\S*/gi,'').replace(/[\uD83C-\uDBFF\uDC00-\uDFFF]/g,'').trim();
  var prodText=cleaned.substring(0,100)+(cleaned.length>100?'...':'');
  function onTS(e){
    if(window.innerWidth>=768)return;
    var t=e.touches[0];
    p.onTouchStart&&p.onTouchStart(l.id,t.clientX,t.clientY,e.currentTarget);
  }
  function openLead(){
    window.location.hash='leads?id='+l.id;
  }
  return h('div',{draggable:'true',
    onDragStart:function(e){e.dataTransfer.setData('text/plain',String(l.id));e.dataTransfer.effectAllowed='move';setTimeout(function(){e.target.classList.add('dragging')},0)},
    onDragEnd:function(e){e.target.classList.remove('dragging')},
    onTouchStart:onTS,
    onClick:openLead,
    className:'bg-white rounded-lg p-2.5 md:p-3 mb-2 shadow-sm cursor-pointer active:cursor-grabbing md:hover:shadow-md transition-all card-in min-w-0 overflow-hidden',
    style:{borderLeft:'4px solid '+sc(l.lead_score)}},
    h('p',{className:'font-bold text-[12px] md:text-sm text-gray-800'},l.full_name),
    h('p',{className:'text-gray-400 mt-0.5',style:{fontSize:'10px'}},l.category),
    h('p',{className:'text-gray-700 mt-1.5 break-words line-clamp-2',style:{fontSize:'14px',lineHeight:'1.5'}},prodText),
    h('p',{className:'font-semibold mt-1.5',style:{fontSize:'10px'}},l.budget,' · ',h('span',{className:'font-normal',style:{fontSize:'9px'}},l.lead_score)),
    uname?h('a',{href:'https://t.me/'+uname,target:'_blank',className:'text-blue-500 hover:underline mt-1 inline-block',style:{fontSize:'9px'},onClick:function(e){e.stopPropagation()}},'💬 '+uname):null
  );
}

function KanbanColumn(p){
  var status=p.status,leads=p.leads,onDrop=p.onDrop;
  var ov=React.useState(false);
  var isOver=ov[0],setOver=ov[1];
  var active=isOver||p.touchOver;
  return h('div',{className:'flex-shrink-0 rounded-xl p-1 md:p-1.5 bg-white shadow-sm border border-gray-100 overflow-hidden',style:{width:window.innerWidth>=768?'185px':'auto',minWidth:window.innerWidth>=768?'185px':'auto'},
    'data-status':status,
    onDragOver:function(e){e.preventDefault();e.dataTransfer.dropEffect='move';setOver(true)},
    onDragLeave:function(e){if(!e.currentTarget.contains(e.relatedTarget))setOver(false)},
    onDrop:function(e){e.preventDefault();setOver(false);var id=parseInt(e.dataTransfer.getData('text/plain'));if(id)onDrop(id,status)}},
    h('div',{className:'text-center font-bold text-[10px] md:text-xs py-1.5 md:py-2 rounded-lg mb-1 md:mb-1.5',style:{background:STATUS_COLORS[status]||'#f5f5f5',color:'#333'}},status+' ('+leads.length+')'),
    h('div',{className:'min-h-[40px] md:min-h-[60px] rounded-lg transition-all min-w-0 '+(active?'drag-over':'')},
      leads.length===0?h('p',{className:'text-center text-gray-300 italic py-4 md:py-6',style:{fontSize:'9px'}},'Пусто'):null,
      leads.map(function(l){return h(KanbanCard,{key:l.id,lead:l,onTouchStart:p.onTouchStart,setPage:p.setPage})})
    )
  );
}

function KanbanPage(p){
  var leads=p.leads,onRefresh=p.onRefresh;
  var ref=React.useRef(leads);
  var local=React.useState(leads);
  var ll=local[0],setLL=local[1];
  React.useEffect(function(){setLL(leads);ref.current=leads},[leads]);
  var handleDrop=React.useCallback(function(id,newStatus){
    var lead=ref.current.find(function(l){return l.id===id});
    if(!lead||lead.status===newStatus)return;
    setLL(function(prev){return prev.map(function(l){return l.id===id?Object.assign({},l,{status:newStatus}):l})});
    saveLead(id,{status:newStatus}).then(function(){onRefresh()});
  },[onRefresh]);

  var td=React.useState(null);
  var touchDrag=td[0],setTouchDrag=td[1];
  var touchStartRef=React.useRef(null);

  function onTouchStart(id,x,y,el){
    var r=el.getBoundingClientRect();
    touchStartRef.current={id:id,offsetX:x-r.left,offsetY:y-r.top,startX:x,startY:y};
  }

  React.useEffect(function(){
    if(!touchDrag)return;
    function onMove(e){
      e.preventDefault();
      var t=e.touches[0];
      if(!touchDrag&&touchStartRef.current){
        var dx=Math.abs(t.clientX-touchStartRef.current.startX);
        var dy=Math.abs(t.clientY-touchStartRef.current.startY);
        if(dx<10&&dy<10)return;
        var s=touchStartRef.current;
        setTouchDrag({id:s.id,offsetX:s.offsetX,offsetY:s.offsetY,x:s.startX,y:s.startY,overCol:null});
        touchStartRef.current=null;
        return;
      }
      setTouchDrag(function(prev){return prev?Object.assign({},prev,{x:t.clientX,y:t.clientY}):prev});
      var el=document.elementFromPoint(t.clientX,t.clientY);
      if(!el)return;
      var col=el.closest('[data-status]');
      setTouchDrag(function(prev){return prev?Object.assign({},prev,{overCol:col?col.getAttribute('data-status'):null}):prev});
    }
    function onEnd(e){
      setTouchDrag(function(prev){
        if(prev&&prev.overCol){
          var id=prev.id;
          var lead=ref.current.find(function(l){return l.id===id});
          if(lead&&lead.status!==prev.overCol){
            setLL(function(pp){return pp.map(function(l){return l.id===id?Object.assign({},l,{status:prev.overCol}):l})});
            saveLead(id,{status:prev.overCol}).then(function(){onRefresh()});
          }
        }
        return null;
      });
      touchStartRef.current=null;
    }
    document.addEventListener('touchmove',onMove,{passive:false});
    document.addEventListener('touchend',onEnd);
    document.addEventListener('touchcancel',onEnd);
    return function(){
      document.removeEventListener('touchmove',onMove);
      document.removeEventListener('touchend',onEnd);
      document.removeEventListener('touchcancel',onEnd);
    };
  },!!touchDrag);

  var groups={};STATUSES.forEach(function(s){groups[s]=[]});ll.forEach(function(l){if(groups[l.status])groups[l.status].push(l)});
  return h('div',null,
    touchDrag?h('div',{className:'touch-ghost',style:{left:touchDrag.x-touchDrag.offsetX+'px',top:touchDrag.y-touchDrag.offsetY+'px',width:'150px'}},
      h('div',{className:'bg-white rounded-lg p-2.5 shadow-lg',style:{borderLeft:'4px solid #ff4b4b'}},
        h('p',{className:'font-bold text-xs text-gray-800'},(ll.find(function(l){return l.id===touchDrag.id})||{}).full_name||''))
    ):null,
    h('h1',{className:'text-xl md:text-2xl font-bold mb-3 md:mb-4'},'🗂 Статусы заявок'),
    h('div',{className:'grid grid-cols-2 gap-2 md:flex md:gap-2 md:overflow-x-auto pb-4 kanban-touch',style:{minHeight:'400px',WebkitOverflowScrolling:'touch'}},
      STATUSES.map(function(s){return h(KanbanColumn,{key:s,status:s,leads:groups[s]||[],onDrop:handleDrop,touchOver:touchDrag&&touchDrag.overCol===s,onTouchStart:onTouchStart,setPage:p.setPage})})
    )
  );
}

function LeadsPage(p){
  var leads=p.leads,onRefresh=p.onRefresh;
  var st=React.useState([]);var fS=st[0],setFS=st[1];
  var ct=React.useState([]);var fC=ct[0],setFC=ct[1];
  var hashId=(window.location.hash||'').match(/id=(\d+)/);
  var ed=React.useState(hashId?parseInt(hashId[1]):null);var editing=ed[0],setEditing=ed[1];
  var fm=React.useState({});var form=fm[0],setForm=fm[1];
  React.useEffect(function(){
    if(editing){
      setTimeout(function(){
        var el=document.getElementById('lead-'+editing);
        if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
      },100);
    }
  },[editing]);
  var cats=[];leads.forEach(function(l){if(cats.indexOf(l.category)<0)cats.push(l.category)});
  var filtered=leads;
  if(fS.length)filtered=filtered.filter(function(l){return fS.indexOf(l.status)>=0});

        h('h3',{className:'font-semibold mb-3 text-sm md:text-base'},'💰 Выручка по месяцам'),
        (stats.monthly_revenue||[]).length?h('div',{className:'space-y-2'},stats.monthly_revenue.map(function(m){
          return h('div',{key:m.month,className:'flex items-center gap-2'},
            h('span',{className:'text-[10px] md:text-xs w-14 md:w-16 text-right text-gray-500'},m.month),
            h('div',{className:'flex-1 bg-gray-100 rounded-full h-5 md:h-6 overflow-hidden'},
              h('div',{className:'h-full rounded-full bg-gradient-to-r from-rose-400 to-peach-400 flex items-center px-2',style:{width:Math.max(8,m.revenue/mxR*100)+'%'}},
                h('span',{className:'text-white text-[10px] md:text-xs font-bold'},fM(m.revenue)))));
        })):h('p',{className:'text-gray-400 text-center mt-10 md:mt-20 text-sm'},'Нет данных')),

        h('h3',{className:'font-semibold mb-3 text-sm md:text-base'},'📊 Воронка'),
        h('div',{className:'space-y-2'},(stats.by_status||[]).map(function(s){
          var mx=Math.max.apply(null,stats.by_status.map(function(x){return x.count}));
          return h('div',{key:s.status,className:'flex items-center gap-2'},
            h('span',{className:'text-[10px] md:text-xs w-20 md:w-28 text-right text-gray-600 truncate'},s.status),
            h('div',{className:'flex-1 bg-gray-100 rounded-full h-5 md:h-6 overflow-hidden'},
              h('div',{className:'h-full rounded-full bg-purple-400 flex items-center px-2',style:{width:Math.max(8,s.count/mx*100)+'%'}},

        })))
    ),
    h('div',{className:'bg-white rounded-xl p-3 md:p-4 shadow-sm border border-gray-100'},

        return h('div',{key:c.category,className:'flex items-center gap-2'},
          h('span',{className:'text-[10px] md:text-xs w-28 md:w-40 text-right text-gray-600 truncate'},c.category),
          h('div',{className:'flex-1 bg-gray-100 rounded-full h-5 md:h-6 overflow-hidden'},
            h('div',{className:'h-full rounded-full bg-green-400 flex items-center px-2',style:{width:Math.max(8,c.revenue/mxCR*100)+'%'}},
              h('span',{className:'text-white text-[10px] md:text-xs font-bold'},fM(c.revenue)))));
      })):h('p',{className:'text-gray-400 text-center mt-8 md:mt-10 text-sm'},'Нет данных'))

var _s=React.useState,_ef=React.useEffect,_cb=React.useCallback;

  if(loading)return h('div',{className:'flex items-center justify-center h-screen'},h('div',{className:'text-center'},h('p',{className:'text-4xl mb-4'},'🌸'),h('p',{className:'text-gray-500'},'Загрузка...')));
  var currentPage=PAGES.find(function(p){return p.k===page});
