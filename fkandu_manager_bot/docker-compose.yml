services:
  frontend:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
    container_name: fkandu-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    networks:
      - fkandu

  backend:
    build:
      context: ./dashboard/backend
      dockerfile: Dockerfile
    container_name: fkandu-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      - DB_PATH=/app/data/leads.db
    volumes:
      - ./data:/app/data
    networks:
      - fkandu

  bot:
    build: .
    container_name: fkandu-bot
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/leads.db
    volumes:
      - ./data:/app/data

networks:
  fkandu:
    driver: bridge
