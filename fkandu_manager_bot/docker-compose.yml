services:
  frontend:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
    container_name: fkandu-frontend
    restart: unless-stopped
    ports:
      - "8000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8001

  backend:
    build:
      context: ./dashboard/backend
      dockerfile: Dockerfile
    container_name: fkandu-backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data

  bot:
    build: .
    container_name: fkandu-bot
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./data:/app/data
