services:
  nginx:
    image: nginx:alpine
    container_name: fkandu-nginx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://127.0.0.1:8001
    container_name: fkandu-frontend
    restart: unless-stopped
    network_mode: host
    environment:
      - NODE_ENV=production
      - PORT=8000
      - HOSTNAME=0.0.0.0

  backend:
    build:
      context: ./dashboard/backend
      dockerfile: Dockerfile
    container_name: fkandu-backend
    restart: unless-stopped
    network_mode: host
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      - DB_PATH=/app/data/leads.db
    volumes:
      - ./data:/app/data

  bot:
    build: .
    container_name: fkandu-bot
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./data:/app/data
