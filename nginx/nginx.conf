events {
    worker_connections 1024;
}

http {
    upstream kanban {
        server kanban:3000;
    }

    upstream fkandu-dashboard {
        server fkandu-dashboard:8000;
    }

    upstream fkandu-files {
        server fkandu-bot:8088;
    }

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name kanban.yourdomain.com dashboard.yourdomain.com files.yourdomain.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Kanban Board
    server {
        listen 443 ssl http2;
        server_name kanban.yourdomain.com;

        ssl_certificate /etc/letsencrypt/live/kanban.yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kanban.yourdomain.com/privkey.pem;

        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            proxy_pass http://kanban;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # FKandu Dashboard
    server {
        listen 443 ssl http2;
        server_name dashboard.yourdomain.com;

        ssl_certificate /etc/letsencrypt/live/dashboard.yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dashboard.yourdomain.com/privkey.pem;

        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            proxy_pass http://fkandu-dashboard;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # FKandu Files
    server {
        listen 443 ssl http2;
        server_name files.yourdomain.com;

        ssl_certificate /etc/letsencrypt/live/files.yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/files.yourdomain.com/privkey.pem;

        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            proxy_pass http://fkandu-files;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Default server - catch all
    server {
        listen 80 default_server;
        server_name _;

        location / {
            return 404;
        }
    }
}
